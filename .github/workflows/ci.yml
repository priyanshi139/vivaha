name: Vivaha CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          [ -f "README.md" ] && echo "✅ README.md" || echo "❌ README.md missing"
          [ -f "package.json" ] && echo "✅ package.json" || echo "❌ package.json missing"
          [ -f "docs/SRS.md" ] && echo "✅ SRS.md" || echo "❌ SRS.md missing"
          [ -f "docs/SDD.md" ] && echo "✅ SDD.md" || echo "❌ SDD.md missing"
          [ -f "tests/test_cases.md" ] && echo "✅ test_cases.md" || echo "❌ missing"
          [ -f "LICENSE" ] && echo "✅ LICENSE" || echo "❌ LICENSE missing"
          echo "All checks done!"
